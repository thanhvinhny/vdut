<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDUT - Menu chính</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #ffffff;
        }
        .container {
            text-align: center;
            width: 90%;
            max-width: 500px;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }
        .subtitle {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .thong-bao {
            font-size: 0.95rem;
            font-weight: bold;
            color: #000000;
            margin-bottom: 25px;
            margin-top: 10px;
            border: 1px solid #000;
            padding: 8px 15px;
            background-color: #f9f9f9;
            display: inline-block;
            border-radius: 4px;
        }
        .bam-duoc {
            cursor: pointer;
        }
        .bam-duoc:hover {
            background-color: #eee;
        }
        hr {
            width: 100%;
            border: 0;
            border-top: 1px solid #ccc;
            margin-bottom: 30px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 15px 0;
            margin: 15px 0;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            background-color: #ffffff;
            border: 2px solid #000000;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            color: #000000;
            box-sizing: border-box;
        }
        .btn:hover {
            background-color: #000000;
            color: #ffffff;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .modal-box {
            background-color: #ffffff;
            padding: 20px;
            border: 2px solid #000000;
            width: 300px;
            text-align: left;
            border-radius: 4px;
        }
        .modal-title {
            margin-top: 0;
            font-size: 16px;
            font-weight: bold;
            border-bottom: 1px solid #000000;
            padding-bottom: 5px;
            margin-bottom: 10px;
            text-align: center;
        }
        .modal-content p {
            margin: 8px 0;
            font-size: 14px;
        }
        .modal-close-btn {
            width: 100%;
            padding: 8px 0;
            background-color: #f2f2f2;
            border: 1px solid #000000;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .modal-close-btn:hover {
            background-color: #e6e6e6;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>VDUT</h1>
    <div class="subtitle">DUT - SUPERAPP</div>
    <div class="thong-bao" id="txtCheDo" onclick="handleCheDoClick()">Đang tải...</div>
    <hr>

    <a href="./lophocphan.html" class="btn">Lớp Học Phần</a>
    <a href="./lichthi.html" class="btn">Danh Sách Thi</a>
    
    <button class="btn" style="border: 1px dashed red; color: red;" onclick="thoatApp()">VDUT</button>
</div>

<div id="studentModal" class="modal-overlay">
    <div class="modal-box">
        <div class="modal-title">THÔNG TIN SINH VIÊN</div>
        <div class="modal-content">
            <p><strong>Họ và tên:</strong> <span id="mdHoten"></span></p>
            <p><strong>MSSV:</strong> <span id="mdMssv"></span></p>
            <p><strong>Ngày sinh:</strong> <span id="mdNgaysinh"></span></p>
            <p><strong>Email:</strong> <span id="mdEmail"></span></p>
            <p><strong>Lớp:</strong> <span id="mdLop"></span></p>
        </div>
        <button class="modal-close-btn" onclick="closeModal()">ĐÓNG</button>
    </div>
</div>

<script>
    var thamSoUrl = new URLSearchParams(window.location.search);
    var laKhach = thamSoUrl.get('role') === 'khach';
    var mssvHienTai = "";
    var hoTenHienTai = "";

    if (laKhach) {
        localStorage.removeItem('saved_mssv');
        localStorage.removeItem('saved_hoten');
        localStorage.removeItem('saved_ngaysinh');
        localStorage.removeItem('saved_lop');
        document.getElementById('txtCheDo').innerText = "Khách";
    } else {
        mssvHienTai = localStorage.getItem('saved_mssv');
        hoTenHienTai = localStorage.getItem('saved_hoten');
        
        if (!mssvHienTai) {
            window.location.href = './index.html';
        } else {
            var el = document.getElementById('txtCheDo');
            el.innerText = "Sinh viên: " + hoTenHienTai + " | MSSV: " + mssvHienTai;
            el.classList.add('bam-duoc');
        }
    }

    function handleCheDoClick() {
        if (laKhach || !mssvHienTai) return;
        
        var ngaysinh = localStorage.getItem('saved_ngaysinh');
        var lop = localStorage.getItem('saved_lop');
        
        if (!ngaysinh || ngaysinh.trim() === "" || ngaysinh === "null" || ngaysinh === "undefined") {
            ngaysinh = "Chưa cập nhật";
        }
        if (!lop || lop.trim() === "" || lop === "null" || lop === "undefined") {
            lop = "Chưa cập nhật";
        }
        
        document.getElementById('mdHoten').innerText = hoTenHienTai;
        document.getElementById('mdMssv').innerText = mssvHienTai;
        document.getElementById('mdNgaysinh').innerText = ngaysinh;
        document.getElementById('mdEmail').innerText = mssvHienTai + "@sv1.dut.udn.vn";
        document.getElementById('mdLop').innerText = lop;
        
        document.getElementById('studentModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('studentModal').style.display = 'none';
    }

    function thoatApp() {
        localStorage.removeItem('saved_mssv');
        localStorage.removeItem('saved_hoten');
        localStorage.removeItem('saved_ngaysinh');
        localStorage.removeItem('saved_lop');
        window.location.href = './index.html';
    }
</script>
</body>
</html>
